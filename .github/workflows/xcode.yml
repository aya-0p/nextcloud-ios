name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PROJECT: Nextcloud.xcodeproj
  DESTINATION: platform=iOS,name=iPhone 16,OS=18.5
  SCHEME: Nextcloud
  SERVER_BRANCH: stable30
  PHP_VERSION: 8.3

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v5

    - name: Download GoogleService-Info.plist
      run: wget "https://raw.githubusercontent.com/firebase/quickstart-ios/master/mock-GoogleService-Info.plist" -O GoogleService-Info.plist

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: '26.0.1'

    - name: Run Xcode Build
      run: |
        set -o pipefail && \
        xcodebuild build \
          -scheme "${{ env.SCHEME }}" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -sdk iphoneos \
          -derivedDataPath build \
        | xcbeautify --quieter

    - name: Copy Nextcloud.app
      run: |
        APP_PATH=$(find build -name "*.app" -type d | head -n 1)
        mkdir Payload
        cp -R "$APP_PATH" Payload

    - name: Create IPA (Unsigned)
      run: zip -r nextcloud.ipa Payload

    - name: Upload IPA (Unsigned)
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: IPA
        path: nextcloud.ipa

    - name: Release IPA (Unsigned)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
      with:
        files: nextcloud.ipa
        draft: true
